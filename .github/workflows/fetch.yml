name: Daily listing fetch

# NOTE: like Redfin in the skagit-housing project, some of these sources may
# block requests from GitHub-hosted runners. This workflow exists to test
# that (run it manually from the Actions tab). If it works reliably,
# uncomment the schedule block; otherwise run daily_update.sh from a local
# machine on a scheduler, which fetches and pushes the data.
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "30 14 * * *"   # 7:30 AM Pacific (14:30 UTC)

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch listings
        run: python fetch_listings.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.db data/listings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily data update $(date -u +%F)"
            git push
          fi
